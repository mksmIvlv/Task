<div class="chat-window">
  <div class="chat-header">
    <h2>AI Assistant</h2>
  </div>

  <div class="chat-messages" #scrollContainer>
    @for (msg of messages(); track $index) {
      <div class="message-row" [class.incoming]="msg.type === 'incoming'" [class.outgoing]="msg.type === 'outgoing'">
        <div class="message">
          @if (msg.type === 'incoming') {
            <markdown [data]="msg.text"></markdown>
          } @else {
            <p>{{ msg.text }}</p>
          }
        </div>
      </div>
    }

    @if (isTyping()) {
      <div class="message-row incoming">
        <div class="message typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    }
  </div>

  <div class="chat-input-area">
    <input
      type="text"
      placeholder="Печатайте..."
      class="chat-input"
      [(ngModel)]="messageText"
      (keydown.enter)="sendMessage()"
    >
    <button class="send-btn" (click)="sendMessage()" [disabled]="!messageText.trim()">Отправить</button>
  </div>
</div>
